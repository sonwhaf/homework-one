<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Beautiful Nature Gallery</h1>

<div class="container">

    <figure>
        <img src="images/mountain.jpg" alt="Snow covered mountain under blue sky">
        <figcaption>Mountains bring peace and fresh air to our lives.</figcaption>
    </figure>

    <figure>
        <img src="images/forest.jpg" alt="Green forest with sunlight shining through trees">
        <figcaption>Forests are full of life and natural beauty.</figcaption>
    </figure>

    <figure>
        <img src="images/beach.jpg" alt="Sunny beach with blue ocean waves">
        <figcaption>The ocean connects the world with endless horizons.</figcaption>
    </figure>

    <figure>
        <img src="images/desert.jpg" alt="Golden desert dunes at sunset">
        <figcaption>Deserts show the power and simplicity of nature.</figcaption>
    </figure>

    <figure>
        <img src="images/lake.jpg" alt="Calm lake reflecting mountains">
        <figcaption>Lakes reflect the beauty that surrounds them.</figcaption>
    </figure>

</div>

</body>
</html>
